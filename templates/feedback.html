<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback | ChemistryLab</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080e14; --surface: #0d1a24; --surface2: #112130;
      --accent: #00d4aa; --text: #e8f4f0; --muted: #7a9dab;
      --border: rgba(0,212,170,0.18); --glow: 0 0 24px rgba(0,212,170,0.12);
    }
    body { filter: blur(10px); opacity: 0; transition: filter .8s ease, opacity .8s ease; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }
    body.loaded { filter: blur(0); opacity: 1; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,170,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,170,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

    nav { position: relative; z-index: 10; max-width: 860px; margin: 24px auto 0; padding: 0 20px; width: 100%; }
    .nav-inner { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; box-shadow: var(--glow); }
    .logo { font-family: 'Space Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: .05em; text-decoration: none; }
    .logo::before { content: '⬡ '; font-size: .9em; }
    .back-btn { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); text-decoration: none; padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; transition: all .2s; }
    .back-btn:hover { color: var(--accent); border-color: rgba(0,212,170,.4); }

    main { position: relative; z-index: 1; max-width: 600px; margin: 40px auto; padding: 0 20px 64px; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 20px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* HEADER */
    .page-header { text-align: center; padding: 40px 32px 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--glow); position: relative; overflow: hidden; animation: fadeIn .4s ease both; }
    .page-header::after { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,212,170,.1) 0%, transparent 70%); pointer-events: none; }
    .page-label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: .2em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
    .page-header h1 { font-family: 'Space Mono', monospace; font-size: clamp(1.3rem, 3.5vw, 1.9rem); font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .page-header h1 span { color: var(--accent); }
    .page-header p { color: var(--muted); font-size: 14px; }

    /* FORM CARD */
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--glow); animation: fadeIn .4s ease .08s both; }
    .form-body { padding: 28px; display: flex; flex-direction: column; gap: 18px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
    .field input, .field textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s; resize: none; }
    .field input::placeholder, .field textarea::placeholder { color: rgba(122,157,171,.5); }
    .field input:focus, .field textarea:focus { border-color: rgba(0,212,170,.5); box-shadow: 0 0 0 3px rgba(0,212,170,.08); }

    .submit-btn { background: var(--accent); color: #080e14; border: none; border-radius: 8px; padding: 14px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: .08em; cursor: pointer; transition: opacity .2s, transform .15s; width: 100%; }
    .submit-btn:hover { opacity: .88; }
    .submit-btn:active { transform: scale(.98); }

    /* DIVIDER */
    .or-divider { display: flex; align-items: center; gap: 12px; padding: 0 28px; }
    .or-line { flex: 1; height: 1px; background: var(--border); }
    .or-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: .1em; }

    /* WHATSAPP */
    .wa-section { padding: 20px 28px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .wa-section p { font-size: 14px; color: var(--muted); }
    .btn-wa { display: inline-flex; align-items: center; gap: 8px; padding: 11px 20px; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: .05em; text-decoration: none; border: 1px solid rgba(37,211,102,.3); color: #25d366; background: rgba(37,211,102,.06); transition: all .2s; white-space: nowrap; }
    .btn-wa:hover { background: rgba(37,211,102,.14); border-color: rgba(37,211,102,.6); }

    footer { position: relative; z-index: 1; background: var(--surface); border-top: 1px solid var(--border); text-align: center; padding: 20px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="logo" href="/">ChemistryLab</a>
      <a href="/" class="back-btn">← Home</a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <p class="page-label">Get in Touch</p>
      <h1>Leave us <span>Feedback</span></h1>
      <p>We'd love to hear from you — report issues, suggest features, or just say hi 😊</p>
    </div>

    <div class="form-card">
      <form action="https://formspree.io/f/mgovrzke" method="POST">
        <div class="form-body">
          <div class="field">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required />
          </div>
          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required />
          </div>
          <div class="field">
            <label for="message">Your Feedback</label>
            <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">SEND FEEDBACK →</button>
          <input type="hidden" name="_next" value="https://yourwebsite.com/thank-you.html" />
        </div>

        <div class="or-divider">
          <div class="or-line"></div>
          <span class="or-text">OR</span>
          <div class="or-line"></div>
        </div>

        <div class="wa-section">
          <p>Prefer a faster reply? Chat directly on WhatsApp.</p>
          <a href="https://wa.me/2349139382808?text=Hi%20ChemistryLab,%20I'm%20reaching%20out%20to%20you%20because?" 
              class="btn-wa" target="_blank">
              <i class="fab fa-whatsapp"></i> CONTACT ME
          </a>

        </div>
      </form>
    </div>
  </main>

  <footer><p>&copy; 2026 ChemistryLab — All rights reserved. Created by Josh Raymond.</p></footer>
  <script>window.addEventListener('load', () => { document.body.classList.add('loaded'); });</script>
</body>
</html>
