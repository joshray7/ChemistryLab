<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Lab Logo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        svg {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
        }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 0;
            font-size: 2.5em;
        }
        .tagline {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
            <!-- Beaker -->
            <path d="M 50 30 L 55 100 Q 55 115 65 115 Q 75 115 75 100 L 80 30 Z" fill="none" stroke="#FF6B6B" stroke-width="3"/>
            <line x1="50" y1="30" x2="80" y2="30" stroke="#FF6B6B" stroke-width="3"/>
            
            <!-- Liquid in beaker -->
            <ellipse cx="65" cy="85" rx="10" ry="8" fill="#4ECDC4" opacity="0.7"/>
            <path d="M 55 85 Q 65 92 75 85" fill="#4ECDC4" opacity="0.7"/>
            
            <!-- Test tube -->
            <circle cx="100" cy="35" r="8" fill="none" stroke="#FFD93D" stroke-width="2.5"/>
            <rect x="94" y="42" width="12" height="50" fill="none" stroke="#FFD93D" stroke-width="2.5" rx="2"/>
            <ellipse cx="100" cy="92" rx="6" ry="4" fill="none" stroke="#FFD93D" stroke-width="2.5"/>
            
            <!-- Liquid in test tube -->
            <rect x="96" y="65" width="8" height="25" fill="#95E1D3" opacity="0.6"/>
            
            <!-- Atom/Molecule symbols -->
            <circle cx="45" cy="55" r="3" fill="#6BCB77"/>
            <circle cx="55" cy="50" r="3" fill="#6BCB77"/>
            <circle cx="50" cy="62" r="3" fill="#6BCB77"/>
            <line x1="45" y1="55" x2="55" y2="50" stroke="#6BCB77" stroke-width="1"/>
            <line x1="45" y1="55" x2="50" y2="62" stroke="#6BCB77" stroke-width="1"/>
            
            <!-- Flask -->
            <path d="M 115 50 L 110 95 Q 110 110 120 110 Q 130 110 130 95 L 125 50 Z" fill="none" stroke="#A8E6CF" stroke-width="2.5"/>
            <rect x="113" y="45" width="14" height="8" fill="none" stroke="#A8E6CF" stroke-width="2.5" rx="1"/>
            
            <!-- Bubbles -->
            <circle cx="65" cy="50" r="2" fill="#FFD93D" opacity="0.6"/>
            <circle cx="72" cy="65" r="2.5" fill="#FFD93D" opacity="0.5"/>
            <circle cx="58" cy="75" r="1.5" fill="#FFD93D" opacity="0.7"/>
        </svg>
        
        <h1>Chemistry Lab</h1>
        <p class="tagline">Explore the Elements • Discover Reactions • Master Science</p>
    </div>
</body>
</html>
